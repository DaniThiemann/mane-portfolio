  <script src="js/main.js"></script>
  <script>
    // Filter
    const filterBtns = document.querySelectorAll('.filter-row .filter-btn');
    const cards = document.querySelectorAll('.archive-grid .project-card');
    const countEl = document.querySelector('.archive-grid ~ * .section-count, .section-header .section-count');

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.textContent.trim().toLowerCase();
        let visible = 0;
        cards.forEach(card => {
          const cats = (card.dataset.cat || '').split(' ');
          const show = filter === 'all' || cats.includes(filter);
          card.style.display = show ? '' : 'none';
          if (show) visible++;
        });
        const countSpan = document.querySelector('.section-header .section-count');
        if (countSpan) countSpan.textContent = '[ 0' + visible + ' ]';
      });
    });
  </script>
  <script>
    // Scale animation iframe to cover its 4:3 card-thumb (height-fill, sides crop)
    function scaleWorkAnim() {
      const thumb = document.querySelector('#fm-card .card-thumb');
      const frame = document.getElementById('fm-anim-frame');
      if (!thumb || !frame) return;
      const scale = thumb.offsetHeight / 1080;
      frame.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }
    window.addEventListener('resize', scaleWorkAnim);

    // Fire animation only when the card enters the viewport
    (function () {
      const frame = document.getElementById('fm-anim-frame');
      if (!frame) return;
      const obs = new IntersectionObserver(function (entries) {
        if (entries[0].isIntersecting) {
          frame.src = frame.dataset.src;
          frame.addEventListener('load', scaleWorkAnim, { once: true });
          obs.disconnect();
        }
      }, { threshold: 0.1 });
      obs.observe(frame.closest('.card-thumb') || frame);
    })();
  </script>
