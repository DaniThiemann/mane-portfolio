<script src="../../../js/gsap.min.js"></script>
<script>
// ── Layout ────────────────────────────────────────────────────────────────
// Both SVGs share a 120-unit tall coordinate space; scale to same px height.
const SCALE   = 1152 / 794;                     // ≈ 1.4508
const SYM_PX  = Math.round(120 * SCALE);        // 174 px  (symbol square)
const TEXT_W  = Math.round(626 * SCALE);        // 908 px
const GAP_PX  = Math.round(48  * SCALE);        // 70 px
const LOCK_W  = SYM_PX + GAP_PX + TEXT_W;      // ≈ 1152 px
const LOCK_X  = Math.round((1920 - LOCK_W) / 2); // 384 px from left
const LOCK_Y  = Math.round((1080 - SYM_PX) / 2); // 453 px from top

// Apply sizes
const sw = document.getElementById('symbol-wrap');
const tw = document.getElementById('text-wrap');
sw.style.cssText += `width:${SYM_PX}px;height:${SYM_PX}px;`;
tw.style.cssText += `width:${TEXT_W}px;height:${SYM_PX}px;`;

// ── Initial positions ─────────────────────────────────────────────────────
// Symbol: centred on screen
gsap.set(sw, { x: Math.round(960 - SYM_PX / 2), y: LOCK_Y });
// Text: off-screen during Phase 1; positioned + revealed in Phase 2
const TEXT_X = LOCK_X + SYM_PX + GAP_PX; // final left edge = 628 px
gsap.set(tw, { x: 1960, y: LOCK_Y });

// ── Expand vectors ────────────────────────────────────────────────────────
// Centroid of the pentagon in SVG user units
const CX = 60, CY = 64.92;
const EXPAND = 13; // SVG units to push each circle outward

const circles = [
  { id: 'd1', ox: 59.969, oy: 19.675 },
  { id: 'd2', ox: 19.997, oy: 52.147 },
  { id: 'd3', ox: 99.999, oy: 52.147 },
  { id: 'd4', ox: 35.261, oy: 100.325 },
  { id: 'd5', ox: 84.743, oy: 100.325 },
].map(c => {
  const dx = c.ox - CX, dy = c.oy - CY;
  const len = Math.hypot(dx, dy);
  return {
    el: document.getElementById(c.id),
    ox: c.ox, oy: c.oy,
    tx: c.ox + (dx / len) * EXPAND,
    ty: c.oy + (dy / len) * EXPAND,
  };
});

// ── Symbol ring: rotate around pentagon centroid ──────────────────────────
gsap.set('#symbol-ring', { svgOrigin: `${CX} ${CY}` });

// ── Timeline ──────────────────────────────────────────────────────────────
const tl = gsap.timeline({ delay: 0.7 });

// Phase 1 — rotate 360° with bounce settle (back.out overshoots ~5° then snaps)
tl.to('#symbol-ring', {
  rotation: 360,
  duration: 1.2,
  ease: 'back.out(1.7)',
}, 0);

// Phase 1 — circles expand outward to peak at 0.65 s, return by 1.2 s
circles.forEach(c => {
  tl.to(c.el, { attr: { cx: c.tx, cy: c.ty }, duration: 0.65, ease: 'sine.inOut' }, 0);
  tl.to(c.el, { attr: { cx: c.ox, cy: c.oy }, duration: 0.55, ease: 'sine.inOut' }, 0.65);
});

// Hold 0.4 s
tl.to({}, { duration: 0.4 });

// Phase 2 — symbol slides left; clip-path tracks symbol right edge so text
// is revealed exactly where the symbol has moved away from (no juxtaposition)
tl.call(() => {
  const symX = gsap.getProperty(sw, 'x');
  const clipPx = Math.max(0, (symX + SYM_PX) - TEXT_X);
  gsap.set(tw, {
    x: TEXT_X,
    clipPath: `inset(0 0 0 ${(clipPx / TEXT_W * 100).toFixed(1)}%)`
  });
});
tl.to(sw, {
  x: LOCK_X,
  duration: 0.5,
  ease: 'power3.out',
  onUpdate() {
    const symX = gsap.getProperty(sw, 'x');
    const clipPx = Math.max(0, (symX + SYM_PX) - TEXT_X);
    gsap.set(tw, { clipPath: `inset(0 0 0 ${(clipPx / TEXT_W * 100).toFixed(1)}%)` });
  },
  onComplete() {
    gsap.set(tw, { clipPath: 'none' });
  }
}, '<');

// Hold final state 2.5 s
tl.to({}, { duration: 2.5 });
</script>
